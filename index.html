<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="严先明 - 个人简历">
    <meta name="referrer" content="no-referrer">
    <title>个人简历 | b3q</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <header class="navbar">
        <div class="container">
            <a href="index.html" class="logo">b3q</a>
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html" class="active">简历</a></li>
                    <li><a href="blogs/blog.html">博客</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">

        <!-- BOSS直聘风格简历头部 -->
        <section class="resume-header" id="resume-header" style="display:none">
            <div class="resume-header-top">
                <div class="resume-avatar" id="r-avatar">严</div>
                <div class="resume-name-box">
                    <h1 class="resume-name" id="r-name"></h1>
                    <p class="resume-brief" id="r-brief"></p>
                </div>
            </div>
            <div class="resume-info-bar" id="r-info-bar"></div>
        </section>

        <!-- Markdown 正文 -->
        <div class="post-content" id="resume-content">
            <p style="text-align:center;color:var(--color-text-muted);padding:3rem 0;">加载中...</p>
        </div>

    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 b3q — Built with ❤️</p>
        </div>
    </footer>

    <script>
    (async function () {
        const el = document.getElementById('resume-content');
        try {
            const resp = await fetch('blogs/posts/个人简历.json');
            if (!resp.ok) throw new Error('简历数据加载失败');
            const r = await resp.json();

            // === BOSS直聘风格头部 ===
            document.getElementById('resume-header').style.display = '';
            document.getElementById('r-name').textContent = r.name || r.title;

            // 头像：有图片则显示图片，否则显示姓名首字
            const avatarEl = document.getElementById('r-avatar');
            if (r.avatar && r.avatar.trim()) {
                avatarEl.innerHTML = `<img src="${escHtml(r.avatar.trim())}" alt="${escHtml(r.name || '')}" class="resume-avatar-img">`;
            } else {
                avatarEl.textContent = (r.name || '?')[0];
            }

            const rank = r.rank || '';
            document.getElementById('r-brief').textContent =
                [r.school, r.major, r.degree, rank].filter(Boolean).join(' / ');

            const infoItems = [];
            if (r.phone)  infoItems.push({ icon: '📱', text: r.phone });
            if (r.school) infoItems.push({ icon: '🎓', text: r.school });
            if (r.period) infoItems.push({ icon: '📅', text: r.period });
            if (r.english) infoItems.push({ icon: '🌐', text: r.english });

            document.getElementById('r-info-bar').innerHTML = infoItems
                .map(i => `<span class="resume-info-item"><span class="resume-info-icon">${i.icon}</span>${escHtml(i.text)}</span>`)
                .join('');

            // === Markdown 正文 ===
            document.title = r.title + ' | b3q';
            el.innerHTML = r.bodyHtml;

            // === 左侧快速索引 (TOC) ===
            buildTOC(el);

        } catch (err) {
            console.error(err);
            el.innerHTML = '<p style="text-align:center;color:var(--color-text-muted);padding:3rem 0;">简历加载失败，请先运行 <code>node js/build.js</code></p>';
        }
    })();

    function escHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    /** 构建左侧目录（与 post.html 同款手风琴 TOC） */
    function buildTOC(contentEl) {
        const headings = contentEl.querySelectorAll('h1, h2, h3, h4, h5, h6');
        if (headings.length < 2) return;

        const items = [];
        const usedIds = new Set();
        headings.forEach(h => {
            let id = h.textContent.trim()
                .toLowerCase()
                .replace(/[^\w一-鿿]+/g, '-')
                .replace(/^-|-$/g, '')
                .replace(/-{2,}/g, '-');
            if (!id) id = 'heading';
            if (usedIds.has(id)) {
                let n = 2;
                while (usedIds.has(id + '-' + n)) n++;
                id = id + '-' + n;
            }
            usedIds.add(id);
            h.id = id;
            items.push({ level: parseInt(h.tagName[1]), text: h.textContent.trim(), id, children: [] });
        });

        // 构建嵌套树
        const tree = [];
        const stack = [];
        items.forEach(item => {
            while (stack.length > 0 && stack[stack.length - 1].level >= item.level) stack.pop();
            if (stack.length === 0) tree.push(item);
            else stack[stack.length - 1].children.push(item);
            stack.push(item);
        });

        function renderTree(nodes) {
            if (!nodes.length) return '';
            let h = '<ul class="toc-list">';
            nodes.forEach(node => {
                const hasChildren = node.children.length > 0;
                h += '<li class="toc-item" data-level="' + node.level + '">';
                h += '<div class="toc-node">';
                if (hasChildren) h += '<span class="toc-arrow">▼</span>';
                h += '<a href="#' + node.id + '" title="' + escHtml(node.text) + '">' + escHtml(node.text) + '</a>';
                h += '</div>';
                if (hasChildren) h += renderTree(node.children);
                h += '</li>';
            });
            h += '</ul>';
            return h;
        }

        const panel = document.createElement('aside');
        panel.className = 'toc-panel';
        panel.innerHTML = '<div class="toc-title">📑 目录</div>' + renderTree(tree);

        const toggle = document.createElement('button');
        toggle.className = 'toc-toggle';
        toggle.innerHTML = '▶';
        toggle.title = '显示目录';
        toggle.setAttribute('aria-label', '切换目录');

        let isOpen = false;
        toggle.addEventListener('click', () => {
            isOpen = !isOpen;
            panel.classList.toggle('toc-open', isOpen);
            toggle.classList.toggle('toc-toggle-open', isOpen);
            toggle.innerHTML = isOpen ? '◀' : '▶';
            toggle.title = isOpen ? '隐藏目录' : '显示目录';
        });

        panel.addEventListener('click', (e) => {
            if (e.target.tagName === 'A') {
                setTimeout(() => {
                    isOpen = false;
                    panel.classList.remove('toc-open');
                    toggle.classList.remove('toc-toggle-open');
                    toggle.innerHTML = '▶';
                    toggle.title = '显示目录';
                }, 200);
            }
            // 手风琴折叠
            const arrow = e.target.closest('.toc-arrow');
            if (arrow) {
                e.preventDefault();
                e.stopPropagation();
                const li = arrow.closest('.toc-item');
                if (li) li.classList.toggle('toc-collapsed');
            }
        });

        document.addEventListener('click', (e) => {
            if (isOpen && !panel.contains(e.target) && e.target !== toggle) {
                isOpen = false;
                panel.classList.remove('toc-open');
                toggle.classList.remove('toc-toggle-open');
                toggle.innerHTML = '▶';
                toggle.title = '显示目录';
            }
        });

        document.body.appendChild(panel);
        document.body.appendChild(toggle);
    }
    </script>

</body>
</html>
